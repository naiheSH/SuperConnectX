name: Build and Release Windows Linux

on:
  push:
    tags:
      - 'v*'
      - 'naihe-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-2022
            builder-target: --win
            artifact-name: windows-release
            artifact-path: |
              release/*.exe
              release/*.zip
              release/*.yml
              release/*.blockmap
          - name: Linux
            os: ubuntu-22.04
            builder-target: --linux
            artifact-name: linux-release
            artifact-path: |
              release/*.AppImage
              release/*.snap
              release/*.deb
              release/*.yml
              release/*.blockmap
          - name: macOS (Apple Silicon)
            os: macos-14
            builder-target: --mac --arm64
            mac-arch: arm64
            artifact-name: macos-arm64
            artifact-path: |
              release/*arm64.dmg
          - name: macOS (Intel)
            os: macos-15-intel
            builder-target: --mac --x64
            mac-arch: x64
            artifact-name: macos-x64
            artifact-path: |
              release/*x64.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools

      - name: Install Python setuptools
        if: runner.os != 'macOS'
        run: python3 -m pip install setuptools

      - name: Install Python setuptools (macOS)
        if: runner.os == 'macOS'
        run: python3 -m pip install setuptools --break-system-packages

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Remove problematic cpu-features (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path node_modules\cpu-features) {
            Remove-Item -Recurse -Force node_modules\cpu-features
          }
          if (Test-Path node_modules\ssh2\node_modules\cpu-features) {
            Remove-Item -Recurse -Force node_modules\ssh2\node_modules\cpu-features
          }

      - name: Remove problematic cpu-features (Linux)
        if: runner.os == 'Linux'
        run: |
          rm -rf node_modules/cpu-features
          rm -rf node_modules/ssh2/node_modules/cpu-features

      - name: Remove problematic cpu-features (macOS)
        if: runner.os == 'macOS'
        run: |
          rm -rf node_modules/cpu-features
          rm -rf node_modules/ssh2/node_modules/cpu-features

      - name: Run tests
        run: npm test

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer and main
        run: npx electron-vite build

      - name: Build package (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win nsis zip --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux --config electron-builder.yml --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package (macOS)
        if: runner.os == 'macOS'
        run: npx electron-builder ${{ matrix.builder-target }} --config electron-builder.yml --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify macOS DMG artifact
        if: runner.os == 'macOS'
        run: |
          shopt -s nullglob
          dmg_files=(release/*${{ matrix.mac-arch }}.dmg)
          if [ ${#dmg_files[@]} -eq 0 ]; then
            echo "Expected macOS ${{ matrix.mac-arch }} DMG was not generated"
            ls -la release
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  build-ubuntu24:
    name: Build Linux (Ubuntu 24 compatible)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools

      - name: Install Python setuptools
        run: python3 -m pip install setuptools

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Downgrade Electron to 35 for Ubuntu 24 compatibility
        run: npm install electron@35.7.5 --save-dev

      - name: Remove problematic cpu-features
        run: |
          rm -rf node_modules/cpu-features
          rm -rf node_modules/ssh2/node_modules/cpu-features

      - name: Run tests
        run: npm test

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer and main
        run: npx electron-vite build

      - name: Build package (Linux Ubuntu 24)
        run: npx electron-builder --linux AppImage deb --config electron-builder.yml --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename Ubuntu 24 artifacts
        run: |
          cd release
          for f in *.AppImage; do mv "$f" "${f%.AppImage}-ubuntu24.AppImage"; done
          for f in *.deb; do mv "$f" "${f%.deb}-ubuntu24.deb"; done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-ubuntu24-release
          path: |
            release/*-ubuntu24.AppImage
            release/*-ubuntu24.deb
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build, build-ubuntu24]
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate combined latest-mac.yml
        run: |
          cd release-assets
          if ls *.dmg 1>/dev/null 2>&1; then
            # Collect DMG info from individual mac yml files (downloaded from build artifacts if present)
            # Generate latest-mac.yml combining both architectures
            VERSION=$(ls *.dmg | head -1 | grep -oP '\d+\.\d+\.\d+' || echo '0.0.0')
            echo "version: $VERSION" > latest-mac.yml
            echo "releaseDate: '$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'" >> latest-mac.yml
            echo "files:" >> latest-mac.yml
            for dmg in *.dmg; do
              SIZE=$(stat -c%s "$dmg" 2>/dev/null || stat -f%z "$dmg" 2>/dev/null || echo 0)
              SHA512=$(sha512sum "$dmg" 2>/dev/null | cut -d' ' -f1 || shasum -a 512 "$dmg" 2>/dev/null | cut -d' ' -f1 || echo '')
              echo "  - url: $dmg" >> latest-mac.yml
              echo "    sha512: $SHA512" >> latest-mac.yml
              echo "    size: $SIZE" >> latest-mac.yml
            done
            echo "Generated latest-mac.yml with $(ls *.dmg | wc -l) architecture(s)"
            cat latest-mac.yml
          fi

      - name: Create Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="$GITHUB_REF_NAME"
            prerelease=""
          else
            tag="manual-$GITHUB_RUN_NUMBER"
            prerelease="--prerelease"
          fi

          gh release delete "$tag" --repo "$REPO" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$tag" \
            --repo "$REPO" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --generate-notes \
            $prerelease \
            release-assets/*
