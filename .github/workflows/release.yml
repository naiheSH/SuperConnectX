name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install Python setuptools (for node-gyp)
        run: pip install setuptools

      - name: Remove problematic cpu-features (ssh2 works without it)
        run: |
          if (Test-Path node_modules\cpu-features) {
            Remove-Item -Recurse -Force node_modules\cpu-features
          }
          if (Test-Path node_modules\ssh2\node_modules\cpu-features) {
            Remove-Item -Recurse -Force node_modules\ssh2\node_modules\cpu-features
          }

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps




      - name: Build and Release (Windows)
        run: npm run build:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Release Description
        run: |
          $releaseBody = Get-Content -Path latest.md -Raw -Encoding UTF8
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          $repo = $env:GITHUB_REPOSITORY

          # Wait for electron-builder's release to be fully created (retry up to 6 times)
          $found = $false
          for ($i = 0; $i -lt 6; $i++) {
            $output = gh release view $tag --repo $repo --json url 2>&1
            if ($LASTEXITCODE -eq 0) {
              $found = $true
              break
            }
            Write-Host "Waiting for release to appear... ($($i+1)/6)"
            Start-Sleep -Seconds 10
          }

          if ($found) {
            gh release edit $tag --repo $repo --notes "$releaseBody"
            Write-Host "Release description updated from latest.md"
          } else {
            Write-Host "Release not found, creating with notes..."
            gh release create $tag --repo $repo --notes "$releaseBody" --title $tag
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
